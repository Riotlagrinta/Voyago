name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/voyago
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/voyago
      - run: npm run build
      - run: npm test -- --runInBand --forceExit
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/voyago
          JWT_SECRET: ci-test-secret

  web:
    name: Web — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://voyago-api-2lcz.onrender.com/api/v1

  mobile:
    name: Mobile — Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
